<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Matrix — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Matrix.css?v=2">
<script>(function(){try{var t=localStorage.getItem('matrix-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();</script>
<script src="firebase-config.js"></script>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="brand-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6.5" height="6.5" rx="1.5" fill="white"/><rect x="8.5" y="1" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.55"/><rect x="1" y="8.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.55"/><rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.25"/></svg></div>
      <div class="login-brand-name">Matrix</div>
    </div>

    <!-- Sign in -->
    <div id="view-signin">
      <div class="login-title">Welcome back</div>
      <div class="login-sub">Sign in to your @maruti.co.in account</div>
      <div class="login-err" id="signin-err"></div>
      <div class="login-form">
        <div class="mf">
          <label class="ml">Email</label>
          <input class="mi" id="signin-email" type="email" placeholder="you@maruti.co.in" autocomplete="email">
        </div>
        <div class="mf">
          <label class="ml">Password</label>
          <input class="mi" id="signin-pass" type="password" placeholder="Password" autocomplete="current-password">
          <a class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>
        <button class="login-submit" id="signin-btn" data-label="Sign in">Sign in</button>
      </div>
      <div class="login-toggle">
        Don't have an account? <a id="goto-create">Create one</a>
      </div>
    </div>

    <!-- Create account -->
    <div id="view-create" style="display:none">
      <div class="login-title">Create account</div>
      <div class="login-sub">Use your @maruti.co.in work email</div>
      <div class="login-err" id="create-err"></div>
      <div class="login-form">
        <div class="mf">
          <label class="ml">Email</label>
          <input class="mi" id="create-email" type="email" placeholder="you@maruti.co.in" autocomplete="email">
        </div>
        <div class="mf">
          <label class="ml">Password</label>
          <input class="mi" id="create-pass" type="password" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <div class="mf">
          <label class="ml">Confirm password</label>
          <input class="mi" id="create-pass2" type="password" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="login-submit" id="create-btn" data-label="Create account">Create account</button>
      </div>
      <div class="login-toggle">
        Already have an account? <a id="goto-signin">Sign in</a>
      </div>
    </div>

    <!-- Forgot password -->
    <div id="view-forgot" style="display:none">
      <div class="login-title">Reset password</div>
      <div class="login-sub">We'll send a reset link to your inbox</div>
      <div class="login-err"     id="forgot-err"></div>
      <div class="login-success" id="forgot-ok">Reset email sent — check your inbox.</div>
      <div class="login-form">
        <div class="mf">
          <label class="ml">Email</label>
          <input class="mi" id="forgot-email" type="email" placeholder="you@maruti.co.in" autocomplete="email">
        </div>
        <button class="login-submit" id="forgot-btn" data-label="Send reset email">Send reset email</button>
      </div>
      <div class="login-toggle">
        <a id="goto-signin2">Back to sign in</a>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/login.js?v=2"></script>
</body>
</html>
