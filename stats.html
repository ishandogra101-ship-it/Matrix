<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Matrix — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Matrix.css?v=2">
<script>(function(){try{var t=localStorage.getItem('matrix-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}window.__toggleTheme=function(){var d=document.documentElement.getAttribute('data-theme')==='dark';var n=d?'light':'dark';document.documentElement.setAttribute('data-theme',n);try{localStorage.setItem('matrix-theme',n);}catch(e){}};})();</script>
<script src="firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- Customize dashboard modal -->
<div class="cust-overlay" id="cust-overlay">
  <div class="cust-box" id="cust-box">
    <div class="cust-header">
      <div class="cust-title">Customize Dashboard</div>
      <button class="cust-close" id="cust-close">✕</button>
    </div>
    <div class="cust-content">
      <div class="cust-section">
        <div class="cust-section-title">
          KPI Metrics
          <span class="cust-count" id="kpi-count">4 selected</span>
        </div>
        <div class="cust-options" id="kpi-options"></div>
      </div>
      <div class="cust-section">
        <div class="cust-section-title">
          Charts
          <span class="cust-count" id="chart-count">4 selected</span>
        </div>
        <div class="cust-options" id="chart-options"></div>
      </div>
    </div>
    <div class="cust-footer">
      <button class="cust-cancel" id="cust-cancel">Cancel</button>
      <button class="cust-apply" id="cust-apply">Apply</button>
    </div>
  </div>
</div>

<div class="app-layout">
  <div class="main-area">

    <!-- Top bar -->
    <header class="topbar">
      <a href="./" class="nav-brand">
        <div class="brand-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6.5" height="6.5" rx="1.5" fill="white"/><rect x="8.5" y="1" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.55"/><rect x="1" y="8.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.55"/><rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.25"/></svg></div>
        <span class="nav-name">Matrix</span>
      </a>
      <nav class="nav-links">
        <span class="nav-link active">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="8.5" width="3.5" height="6" rx="1" fill="currentColor"/><rect x="6.25" y="5" width="3.5" height="9.5" rx="1" fill="currentColor"/><rect x="11" y="1.5" width="3.5" height="13" rx="1" fill="currentColor"/></svg>
          <span>Stats</span>
        </span>
        <a href="handbook" class="nav-link" target="_blank">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3.5A1.5 1.5 0 013.5 2h9A1.5 1.5 0 0114 3.5v10a1.5 1.5 0 01-1.5 1.5h-9A1.5 1.5 0 012 13.5v-10z"/><path d="M5 2v13M8 5.5h3M8 8h3M8 10.5h2"/></svg>
          <span>Guide</span>
        </a>
      </nav>
      <div class="topbar-right">
        <span class="nav-user" id="sb-user"></span>
        <button class="nav-icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark" onclick="__toggleTheme()"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="3.1"/><path d="M8 1.2v1.5M8 13.3v1.5M2.7 2.7l1.05 1.05M12.25 12.25l1.05 1.05M1.2 8h1.5M13.3 8h1.5M2.7 13.3l1.05-1.05M12.25 3.75l1.05-1.05"/></svg></button>
        <button class="nav-icon-btn nav-logout" id="sb-logout" title="Sign out"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2H4a1 1 0 00-1 1v10a1 1 0 001 1h5.5"/><path d="M10.5 5.5L13.5 8l-3 2.5"/><path d="M13.5 8H6.5"/></svg></button>
      </div>
    </header>

    <div class="stats-content" id="stats-content">

      <!-- Dashboard header -->
      <div class="dash-header">
        <div>
          <div class="dash-title">Dashboard</div>
          <div class="dash-sub">Your productivity at a glance</div>
        </div>
        <div class="dash-actions">
          <button class="customize-btn" id="customize-btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4h10M2 10h10"/><circle cx="5" cy="4" r="1.5" fill="currentColor" stroke="none"/><circle cx="9" cy="10" r="1.5" fill="currentColor" stroke="none"/></svg>
            <span>Customize</span>
          </button>
          <button class="export-btn" id="export-btn" title="Download all data as Excel">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 1.5v7.5"/><path d="M4 6l3 3 3-3"/><path d="M2 11.5h10"/></svg>
            <span>Export</span>
          </button>
          <div class="dash-date" id="dash-date"></div>
        </div>
      </div>

      <!-- KPI cards (JS-rendered) -->
      <div class="kpi-row" id="kpi-row"></div>

      <!-- Charts (JS-rendered) -->
      <div class="charts-grid" id="charts-grid"></div>

    </div>
  </div>
</div>

<script type="module" src="js/stats.js?v=2"></script>
</body>
</html>
