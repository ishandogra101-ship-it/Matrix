<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Matrix — Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="Matrix.css">
<script src="firebase-config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-layout">

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sb-brand">
      <div class="brand-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6.5" height="6.5" rx="1.5" fill="white"/><rect x="8.5" y="1" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.55"/><rect x="1" y="8.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.55"/><rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1.5" fill="white" opacity="0.25"/></svg></div>
      <div class="sb-name">Matrix</div>
    </div>
    <div class="sb-nav">
      <a href="index.html" class="sb-link">
        <span class="sb-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6.5" height="6.5" rx="1.5" fill="currentColor"/><rect x="8.5" y="1" width="6.5" height="6.5" rx="1.5" fill="currentColor" opacity="0.45"/><rect x="1" y="8.5" width="6.5" height="6.5" rx="1.5" fill="currentColor" opacity="0.45"/><rect x="8.5" y="8.5" width="6.5" height="6.5" rx="1.5" fill="currentColor" opacity="0.2"/></svg></span>
        <span>Matrix</span>
      </a>
      <a href="stats.html" class="sb-link active">
        <span class="sb-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1.5" y="8.5" width="3.5" height="6" rx="1" fill="currentColor"/><rect x="6.25" y="5" width="3.5" height="9.5" rx="1" fill="currentColor"/><rect x="11" y="1.5" width="3.5" height="13" rx="1" fill="currentColor"/></svg></span>
        <span>Stats</span>
      </a>
    </div>
    <div class="sb-footer">
      <div class="sb-user" id="sb-user"></div>
      <button class="sb-logout" id="sb-logout">
        <span class="sb-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2H4a1 1 0 00-1 1v10a1 1 0 001 1h5.5"/><path d="M10.5 5.5L13.5 8l-3 2.5"/><path d="M13.5 8H6.5"/></svg></span>
        <span>Sign out</span>
      </button>
    </div>
  </nav>

  <!-- Main area -->
  <div class="main-area">
    <header class="topbar">
      <a href="index.html" class="stats-back-btn" title="Back to Matrix">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L4 8l6 5"/></svg>
        <span>Matrix</span>
      </a>
      <div class="stats-page-title">Statistics</div>
      <div class="topbar-right">
        <button class="stats-signout-btn" id="sb-logout" title="Sign out">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2H4a1 1 0 00-1 1v10a1 1 0 001 1h5.5"/><path d="M10.5 5.5L13.5 8l-3 2.5"/><path d="M13.5 8H6.5"/></svg>
        </button>
      </div>
    </header>

    <div class="stats-content" id="stats-content">
      <!-- Stat cards -->
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-card-label">Total tasks</div>
          <div class="stat-card-value" id="sc-total">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Open</div>
          <div class="stat-card-value accent-q1" id="sc-open">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Done today</div>
          <div class="stat-card-value accent-green" id="sc-today">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Completion rate</div>
          <div class="stat-card-value accent-primary" id="sc-rate">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-label">Avg completion</div>
          <div class="stat-card-value" id="sc-avg">—</div>
          <div class="stat-card-sub" id="sc-avg-sub">creation → done</div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-card-title">Tasks over time — last 30 days</div>
          <div class="chart-wrap" style="height:220px;">
            <canvas id="chart-timeline"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Open tasks by quadrant</div>
          <div class="chart-wrap" style="height:220px;display:flex;align-items:center;justify-content:center;">
            <canvas id="chart-quadrant" style="max-width:220px;max-height:220px;"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Tasks by category</div>
          <div class="chart-wrap" style="height:220px;">
            <canvas id="chart-category"></canvas>
          </div>
        </div>
        <div class="chart-card">
          <div class="chart-card-title">Avg completion time by quadrant (hours)</div>
          <div class="chart-wrap" style="height:220px;">
            <canvas id="chart-speed"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /app-layout -->

<script type="module">
import { initializeApp }                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signOut }   from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, getDocs,
         doc, getDoc }                            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

if (window.FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') {
  document.querySelector('.main-area').innerHTML = `
    <div style="padding:40px;font-family:inherit;">
      <h2 style="font-family:'Inter',sans-serif;font-size:18px;font-weight:700;margin-bottom:12px;color:#0D1526;">Firebase setup required</h2>
      <p style="color:#6B7A99;">Open <code style="background:#F0F3F8;padding:2px 8px;border-radius:5px;">firebase-config.js</code> and fill in your Firebase credentials.</p>
    </div>`;
  throw new Error('Firebase not configured');
}

const app  = initializeApp(window.FIREBASE_CONFIG);
const auth = getAuth(app);
const db   = getFirestore(app);

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'login.html'; return; }
  const sbUser = document.getElementById('sb-user');
  if (sbUser) sbUser.textContent = user.email.split('@')[0];
  loadAndRender(user);
});

document.getElementById('sb-logout').addEventListener('click', async () => {
  await signOut(auth);
  window.location.href = 'login.html';
});

const DEFAULT_CATEGORIES = [
  {id:'work',     label:'Work',     bg:'#e4efff', color:'#1a4a9a'},
  {id:'personal', label:'Personal', bg:'#f3eef8', color:'#5c1a7a'},
  {id:'health',   label:'Health',   bg:'#d6f7e8', color:'#047857'},
  {id:'other',    label:'Other',    bg:'#f4f5fc', color:'#73769e'},
];
const Q_COLORS = { q1:'#C8102E', q2:'#00205B', q3:'#00875A', q4:'#9BAABB' };
const Q_LABELS = { q1:'Q1 Do First', q2:'Q2 Schedule', q3:'Q3 Delegate', q4:'Q4 Eliminate' };

let charts = {};

async function loadAndRender(user) {
  let categories = [...DEFAULT_CATEGORIES];
  try {
    const snap = await getDoc(doc(db, 'users', user.uid, 'categories', 'list'));
    if (snap.exists() && snap.data().items?.length) categories = snap.data().items;
  } catch { /* use defaults */ }

  let tasks = [];
  try {
    const snap = await getDocs(collection(db, 'users', user.uid, 'tasks'));
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  } catch {
    document.getElementById('topbar-info').textContent = 'Failed to load data';
    return;
  }

  renderSummary(tasks);
  renderCharts(tasks, categories);
}

function renderSummary(tasks) {
  const todayMs  = new Date().setHours(0, 0, 0, 0);
  const doneAll  = tasks.filter(t => t.done);
  const total    = tasks.length;
  const open     = tasks.filter(t => !t.done).length;
  const doneToday = doneAll.filter(t => t.completedAt >= todayMs).length;
  const rate     = total ? Math.round(doneAll.length / total * 100) : 0;

  const times = doneAll
    .filter(t => t.createdAt && t.completedAt)
    .map(t => t.completedAt - t.createdAt);
  let avgStr = '—', avgSub = 'creation → done';
  if (times.length) {
    const avgMs = times.reduce((a, b) => a + b, 0) / times.length;
    const h = Math.floor(avgMs / 3_600_000);
    const d = Math.floor(h / 24);
    avgStr = d > 0 ? `${d}d ${h % 24}h` : `${h}h`;
    avgSub = `avg of ${times.length} completed`;
  }

  document.getElementById('sc-total').textContent = total;
  document.getElementById('sc-open').textContent  = open;
  document.getElementById('sc-today').textContent = doneToday;
  document.getElementById('sc-rate').textContent  = rate + '%';
  document.getElementById('sc-avg').textContent   = avgStr;
  document.getElementById('sc-avg-sub').textContent = avgSub;
}

function renderCharts(tasks, categories) {
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  const baseOpts = (extra = {}) => ({
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { font: { family: 'Inter', size: 11 }, boxWidth: 12, padding: 10 } },
    },
    ...extra,
  });

  /* ── Timeline: created vs completed, last 30 days ── */
  (() => {
    const DAYS = 30;
    const now  = Date.now();
    const labels    = [];
    const created   = new Array(DAYS).fill(0);
    const completed = new Array(DAYS).fill(0);

    for (let i = DAYS - 1; i >= 0; i--) {
      labels.push(new Date(now - i * 86_400_000).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }));
    }
    tasks.forEach(t => {
      if (t.createdAt) {
        const idx = DAYS - 1 - Math.floor((now - t.createdAt) / 86_400_000);
        if (idx >= 0 && idx < DAYS) created[idx]++;
      }
      if (t.completedAt) {
        const idx = DAYS - 1 - Math.floor((now - t.completedAt) / 86_400_000);
        if (idx >= 0 && idx < DAYS) completed[idx]++;
      }
    });

    charts.timeline = new Chart(document.getElementById('chart-timeline'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'Created',   data: created,   borderColor:'#00205B', backgroundColor:'rgba(0,32,91,.08)',    tension:.35, fill:true, pointRadius:2, borderWidth:2 },
          { label: 'Completed', data: completed, borderColor:'#00875A', backgroundColor:'rgba(0,135,90,.08)',  tension:.35, fill:true, pointRadius:2, borderWidth:2 },
        ],
      },
      options: baseOpts({
        scales: {
          x: { ticks: { maxTicksLimit: 8, font: { size: 10 } }, grid: { display: false } },
          y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } },
        },
      }),
    });
  })();

  /* ── Quadrant donut (open tasks) ── */
  (() => {
    const open   = tasks.filter(t => !t.done);
    const counts = ['q1','q2','q3','q4'].map(q => open.filter(t => t.q === q).length);

    charts.quadrant = new Chart(document.getElementById('chart-quadrant'), {
      type: 'doughnut',
      data: {
        labels:   ['Q1 Do First','Q2 Schedule','Q3 Delegate','Q4 Eliminate'],
        datasets: [{ data: counts, backgroundColor: Object.values(Q_COLORS), borderWidth: 0, hoverOffset: 8 }],
      },
      options: baseOpts({ cutout: '65%', plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 12, padding: 8 } } } }),
    });
  })();

  /* ── Category breakdown (horizontal bar) ── */
  (() => {
    const counts  = Object.fromEntries(categories.map(c => [c.id, 0]));
    tasks.forEach(t => { if (counts[t.tag] !== undefined) counts[t.tag]++; });

    charts.category = new Chart(document.getElementById('chart-category'), {
      type: 'bar',
      data: {
        labels:   categories.map(c => c.label),
        datasets: [{
          label: 'Tasks',
          data:             categories.map(c => counts[c.id] || 0),
          backgroundColor:  categories.map(c => c.bg),
          borderColor:      categories.map(c => c.color),
          borderWidth: 1.5,
          borderRadius: 5,
        }],
      },
      options: baseOpts({
        indexAxis: 'y',
        plugins: { legend: { display: false } },
        scales: {
          x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } },
          y: { ticks: { font: { size: 11 } }, grid: { display: false } },
        },
      }),
    });
  })();

  /* ── Completion speed by quadrant (bar, avg hours) ── */
  (() => {
    const done  = tasks.filter(t => t.done && t.createdAt && t.completedAt);
    const sums  = { q1:0, q2:0, q3:0, q4:0 };
    const cnts  = { q1:0, q2:0, q3:0, q4:0 };
    done.forEach(t => {
      if (sums[t.q] !== undefined) { sums[t.q] += (t.completedAt - t.createdAt) / 3_600_000; cnts[t.q]++; }
    });
    const avgs = ['q1','q2','q3','q4'].map(q => cnts[q] ? +(sums[q] / cnts[q]).toFixed(1) : 0);

    charts.speed = new Chart(document.getElementById('chart-speed'), {
      type: 'bar',
      data: {
        labels:   ['Q1 Do First','Q2 Schedule','Q3 Delegate','Q4 Eliminate'],
        datasets: [{
          label: 'Avg hours',
          data:            avgs,
          backgroundColor: Object.values(Q_COLORS).map(c => c + 'cc'),
          borderColor:     Object.values(Q_COLORS),
          borderWidth: 1.5,
          borderRadius: 6,
        }],
      },
      options: baseOpts({
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } },
          x: { ticks: { font: { size: 10 } }, grid: { display: false } },
        },
      }),
    });
  })();
}
</script>
</body>
</html>
