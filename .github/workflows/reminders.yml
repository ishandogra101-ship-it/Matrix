name: Send Q1 Reminders

on:
  workflow_dispatch:        # Manual trigger only (from GitHub Actions tab)

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --production
        working-directory: .github/scripts

      - name: Send reminders
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          POWER_AUTOMATE_URL: ${{ secrets.POWER_AUTOMATE_URL }}
          APP_URL: https://ishandogra101-ship-it.github.io/Matrix/
        run: node .github/scripts/send-reminders.js
